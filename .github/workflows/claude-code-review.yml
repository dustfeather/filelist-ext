name: Claude Code Review

on:
    pull_request:
        types: [opened, synchronize]
        # Avoid the claude-code-action self-modify validation guard tripping
        # on PRs that change this very file. Narrow path — broader filters
        # like '.github/**' would skip review on unrelated workflow PRs.
        paths-ignore:
            - '.github/workflows/claude-code-review.yml'

jobs:
    review:
        uses: dustfeather/shared-workflows/.github/workflows/claude-code-review.yml@v1
        secrets: inherit
