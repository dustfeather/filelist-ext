name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: latest

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Determine next version from tags
              id: version
              run: |
                  latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
                  if [ -z "$latest" ]; then
                    next="1.0.0"
                  else
                    IFS='.' read -r major minor patch <<< "${latest#v}"
                    next="$major.$minor.$((patch + 1))"
                  fi
                  echo "version=$next" >> "$GITHUB_OUTPUT"
                  echo "tag=v$next" >> "$GITHUB_OUTPUT"
                  echo "Next version: $next (previous: ${latest:-none})"

            - name: Inject version into manifest
              run: |
                  node -e "
                    const fs = require('fs');
                    const m = JSON.parse(fs.readFileSync('src/manifest.json', 'utf8'));
                    m.version = '${{ steps.version.outputs.version }}';
                    fs.writeFileSync('src/manifest.json', JSON.stringify(m, null, 4) + '\n');
                  "

            - run: pnpm run build

            - name: Tag release
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.version.outputs.tag }}"
                  git push origin "${{ steps.version.outputs.tag }}"

            - name: Package Chrome extension
              run: cd dist && zip -r ../filelist-tv-monitor-chrome-${{ steps.version.outputs.tag }}.zip .

            - name: Package Firefox extension
              run: cd dist && zip -r ../filelist-tv-monitor-firefox-${{ steps.version.outputs.tag }}.xpi .

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  generate_release_notes: true
                  files: |
                      filelist-tv-monitor-chrome-${{ steps.version.outputs.tag }}.zip
                      filelist-tv-monitor-firefox-${{ steps.version.outputs.tag }}.xpi

            - name: Upload to Chrome Web Store
              run: npx -y chrome-webstore-upload-cli@3 upload --auto-publish --source filelist-tv-monitor-chrome-${{ steps.version.outputs.tag }}.zip
              env:
                  EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
                  CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
                  CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
                  REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
