name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: true

jobs:
    release:
        uses: dustfeather/shared-workflows/.github/workflows/release-extension.yml@v4
        with:
            runner: arc-df-filelist-ext
            targets: '["chrome","firefox"]'
            addon-id: filelist-tv-monitor@extension
        secrets: inherit
