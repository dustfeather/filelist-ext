<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileList Monitor</title>
    <link rel="stylesheet" href="popup.scss">
</head>
<body class="w-[360px] min-h-[400px] bg-surface text-on-surface font-sans">
    <div class="p-4 space-y-3">
        <!-- Top app bar -->
        <div class="flex items-center justify-between">
            <h1 class="text-[length:--font-size-title-lg] leading-[--line-height-title-lg] font-medium tracking-tight text-on-surface">FileList Monitor</h1>
            <div id="status" class="flex items-center gap-1.5 text-[length:--font-size-label-md] leading-[--line-height-label-md] text-on-surface-variant">
                <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
                <span id="last-check">—</span>
            </div>
        </div>

        <!-- Add series -->
        <div class="flex gap-2 items-center">
            <input id="series-input" type="text" placeholder="Add series..."
                class="flex-1 h-10 px-4 rounded-full bg-surface-container-high
                       text-[length:--font-size-body-md] leading-[--line-height-body-md]
                       text-on-surface placeholder:text-on-surface-variant/50
                       outline-none focus:ring-2 focus:ring-primary transition-all duration-200
                       disabled:opacity-40">
            <button id="strict-toggle" title="Strict: season packs only" aria-label="Toggle strict mode"
                class="icon-btn-outlined text-[length:--font-size-label-lg]">
                S
            </button>
            <button id="add-btn"
                class="h-10 px-5 rounded-full bg-primary text-on-primary
                       text-[length:--font-size-label-lg] leading-[--line-height-label-lg] font-medium
                       active:scale-[0.98] transition-all duration-200
                       disabled:bg-on-surface/12 disabled:text-on-surface/40">
                Add
            </button>
        </div>

        <!-- Series list -->
        <div id="series-list" class="flex flex-col gap-1"></div>
        <div id="empty-state" class="hidden text-center py-10 text-on-surface-variant text-[length:--font-size-body-md]">
            No series tracked yet
        </div>

        <!-- Settings -->
        <details class="group">
            <summary class="text-[length:--font-size-label-md] leading-[--line-height-label-md] text-on-surface-variant cursor-pointer hover:text-on-surface transition-colors duration-200 select-none">
                Settings
            </summary>
            <div class="mt-2 space-y-4 p-4 rounded-2xl bg-surface-container">
                <div class="text-field-wrap">
                    <input id="username-input" type="text" placeholder=" "
                        class="text-field peer">
                    <label for="username-input" class="text-field-label">Username</label>
                </div>
                <div class="text-field-wrap">
                    <input id="passkey-input" type="password" placeholder=" "
                        class="text-field peer">
                    <label for="passkey-input" class="text-field-label">Passkey</label>
                </div>
                <div class="flex justify-end">
                    <button id="save-creds"
                        class="h-9 px-4 rounded-full bg-secondary-container text-on-secondary-container
                               text-[length:--font-size-label-md] font-medium transition-all duration-200">
                        Save
                    </button>
                </div>
            </div>
        </details>
    </div>
    <script type="module" src="popup.ts"></script>
</body>
</html>
